<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>木村のミニゲーム（長いステージ）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
    touch-action: manipulation;
  }
  canvas {
    display: block;
    margin: auto;
    background: #87CEEB;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== 画面サイズ =====
canvas.width = window.innerWidth;
canvas.height = 400;

// ===== 音 =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  if (type === "jump") osc.frequency.value = 500;
  if (type === "coin") osc.frequency.value = 800;
  if (type === "goal") osc.frequency.value = 1000;
  if (type === "gameover") osc.frequency.value = 150;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
}

// ===== プレイヤー =====
const player = { x: 50, y: 300, width: 30, height: 40, dy: 0, gravity: 0.6, jumpPower: -12, onGround: true };

// ===== 地面 =====
const ground = { y: 350 };

// ===== 障害物（ブロック） =====
let blocks = [
  { x: 500, y: 300, width: 40, height: 50 },
  { x: 800, y: 280, width: 40, height: 70 },
  { x: 1100, y: 310, width: 40, height: 40 },
  { x: 1400, y: 300, width: 40, height: 50 },
  { x: 1800, y: 280, width: 40, height: 60 },
  { x: 2200, y: 310, width: 40, height: 40 },
  { x: 2600, y: 300, width: 40, height: 50 },
  { x: 2900, y: 280, width: 40, height: 70 }
];

// ===== 敵 =====
let enemies = [
  { x: 700, y: 320, size: 30, speed: -2 },
  { x: 1700, y: 320, size: 30, speed: 2 },
  { x: 2300, y: 320, size: 30, speed: -2 },
  { x: 2700, y: 320, size: 30, speed: 2 }
];

// ===== コイン =====
let coins = [
  { x: 600, y: 200, size: 20 },
  { x: 1000, y: 180, size: 20 },
  { x: 1500, y: 250, size: 20 },
  { x: 2000, y: 200, size: 20 },
  { x: 2500, y: 180, size: 20 },
  { x: 2800, y: 250, size: 20 }
];

// ===== ゴール =====
let goal = { x: 3500, y: 300, width: 20, height: 50 };

// ===== スコア =====
let score = 0;
let cameraX = 0;

// ===== 入力 =====
let keys = {};
let touchJump = false;

// タップ用ボタン
const jumpButton = { x: canvas.width - 100, y: canvas.height - 100, size: 80 };

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

canvas.addEventListener("touchstart", (e) => {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;
  if (tx > jumpButton.x && tx < jumpButton.x + jumpButton.size &&
      ty > jumpButton.y && ty < jumpButton.y + jumpButton.size) touchJump = true;
});

canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (mx > jumpButton.x && mx < jumpButton.x + jumpButton.size &&
      my > jumpButton.y && my < jumpButton.y + jumpButton.size) touchJump = true;
});

// ===== キャラ描画（マリオ風） =====
function drawPlayer(x, y) {
  // 帽子
  ctx.fillStyle = "red";
  ctx.fillRect(x, y, 30, 10);
  // 顔
  ctx.fillStyle = "#ffcc99";
  ctx.fillRect(x + 5, y + 10, 20, 15);
  // 目
  ctx.fillStyle = "black";
  ctx.fillRect(x + 10, y + 15, 3, 3);
  // ヒゲ
  ctx.fillRect(x + 8, y + 22, 15, 3);
  // 服
  ctx.fillStyle = "blue";
  ctx.fillRect(x + 5, y + 25, 20, 15);
  // 足
  ctx.fillStyle = "brown";
  ctx.fillRect(x + 5, y + 38, 8, 5);
  ctx.fillRect(x + 17, y + 38, 8, 5);
}

// ===== 更新 =====
function update() {
  // ジャンプ
  if ((keys["Space"] || touchJump) && player.onGround) {
    player.dy = player.jumpPower;
    player.onGround = false;
    playSound("jump");
  }
  touchJump = false;

  player.dy += player.gravity;
  player.y += player.dy;

  // 地面
  if (player.y + player.height > ground.y) {
    player.y = ground.y - player.height;
    player.dy = 0;
    player.onGround = true;
  }

  // ブロック衝突
  blocks.forEach(b => {
    let px = player.x + cameraX;
    if (px < b.x + b.width && px + player.width > b.x &&
        player.y + player.height > b.y && player.y < b.y + b.height) {
      if (player.dy > 0) { player.y = b.y - player.height; player.dy = 0; player.onGround = true; }
    }
  });

  cameraX += 2;

  // 敵移動＋跳ね返り
  enemies.forEach(e => {
    e.x += e.speed;
    blocks.forEach(b => {
      if (e.x < b.x + b.width && e.x + e.size > b.x &&
          e.y < b.y + b.height && e.y + e.size > b.y) {
        e.speed *= -1;
        if (e.speed > 0) e.x = b.x + b.width; else e.x = b.x - e.size;
      }
    });
    if (e.x < 0 || e.x > 2000) e.speed *= -1;

    // 衝突判定
    if (player.x + cameraX < e.x + e.size &&
        player.x + player.width + cameraX > e.x &&
        player.y < e.y + e.size &&
        player.y + player.height > e.y) {
      playSound("gameover");
      setTimeout(() => { alert("ゲームオーバー！スコア：" + score); location.reload(); }, 100);
    }
  });

  // コイン
  coins.forEach(c => {
    if (player.x + cameraX < c.x + c.size &&
        player.x + player.width + cameraX > c.x &&
        player.y < c.y + c.size &&
        player.y + player.height > c.y) {
      score += 10;
      playSound("coin");
      c.x = -100;
    }
  });

  // ゴール
  if (player.x + cameraX < goal.x + goal
