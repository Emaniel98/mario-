<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>木村のミニゲームDX+</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
  }
  canvas {
    display: block;
    margin: auto;
    background: #87CEEB;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== 音 =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === "jump") osc.frequency.value = 500;
  if (type === "coin") osc.frequency.value = 800;
  if (type === "goal") osc.frequency.value = 1000;
  if (type === "gameover") osc.frequency.value = 150;

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
}

// ===== プレイヤー =====
const player = {
  x: 50,
  y: 300,
  width: 30,
  height: 30,
  dy: 0,
  gravity: 0.6,
  jumpPower: -12,
  onGround: true
};

// ===== 地面 =====
const ground = { y: 350 };

// ===== 敵 =====
let enemies = [
  { x: 600, y: 320, size: 30 }
];

// ===== コイン =====
let coins = [
  { x: 400, y: 250, size: 20 },
  { x: 700, y: 200, size: 20 }
];

// ===== ゴール =====
let goal = {
  x: 1500,
  y: 300,
  width: 20,
  height: 50
};

// ===== スコア =====
let score = 0;

// ===== カメラ（スクロール用）=====
let cameraX = 0;

let keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// ===== 更新 =====
function update() {

  // ジャンプ
  if (keys["Space"] && player.onGround) {
    player.dy = player.jumpPower;
    player.onGround = false;
    playSound("jump");
  }

  // 重力
  player.dy += player.gravity;
  player.y += player.dy;

  // 地面
  if (player.y + player.height > ground.y) {
    player.y = ground.y - player.height;
    player.dy = 0;
    player.onGround = true;
  }

  // カメラ移動（右へ進む）
  cameraX += 2;

  // 敵
  enemies.forEach(e => {
    e.x -= 4;

    // 当たり判定
    if (
      player.x + cameraX < e.x + e.size &&
      player.x + player.width + cameraX > e.x &&
      player.y < e.y + e.size &&
      player.y + player.height > e.y
    ) {
      playSound("gameover");
      setTimeout(() => {
        alert("ゲームオーバー！スコア：" + score);
        location.reload();
      }, 100);
    }
  });

  // コイン
  coins.forEach(c => {
    if (
      player.x + cameraX < c.x + c.size &&
      player.x + player.width + cameraX > c.x &&
      player.y < c.y + c.size &&
      player.y + player.height > c.y
    ) {
      score += 10;
      playSound("coin");
      c.x = -100; // 消す
    }
  });

  // ===== ゴール判定 =====
  if (
    player.x + cameraX < goal.x + goal.width &&
    player.x + player.width + cameraX > goal.x &&
    player.y < goal.y + goal.height &&
    player.y + player.height > goal.y
  ) {
    playSound("goal");
    setTimeout(() => {
      alert("クリア！スコア：" + score);
      location.reload();
    }, 100);
  }
}

// ===== 描画 =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 地面
  ctx.fillStyle = "#228B22";
  ctx.fillRect(0, ground.y, canvas.width, 50);

  // プレイヤー
  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // 敵
  ctx.fillStyle = "#8B0000";
  enemies.forEach(e => {
    ctx.fillRect(e.x - cameraX, e.y, e.size, e.size);
  });

  // コイン
  ctx.fillStyle = "gold";
  coins.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x - cameraX, c.y, c.size / 2, 0, Math.PI * 2);
    ctx.fill();
  });

  // ゴール（旗）
  ctx.fillStyle = "#000";
  ctx.fillRect(goal.x - cameraX, goal.y, goal.width, goal.height);
  ctx.fillStyle = "red";
  ctx.fillRect(goal.x - cameraX, goal.y, 30, 20);

  // スコア
  ctx.fillStyle = "#333";
  ctx.font = "20px sans-serif";
  ctx.fillText("スコア: " + score, 20, 30);

  ctx.fillText("ゴールを目指せ！", 20, 60);
}

// ===== ループ =====
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
